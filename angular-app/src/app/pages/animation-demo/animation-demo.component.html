<h1>Animation demo</h1>
<p class="hint">CSS transitions and simple class toggles that are easy to assert in end-to-end tests.</p>

<div class="panel">
  <button mat-stroked-button type="button" data-testid="trigger-move" (click)="triggerMove()">Move box</button>

  <div
    class="box"
    data-testid="animated-element"
    [class.moved]="moved()"
    [class.animation-complete]="animationComplete()"
  ></div>
</div>

<div class="panel">
  <button mat-button type="button" (click)="toggleFade()">Toggle fade</button>
  <div
    class="fade"
    data-testid="fade-element"
    [class.fade-in]="fadedIn()"
    [class.fade-out]="!fadedIn()"
  >
    Fade content
  </div>
</div>
