<header>
  <mat-toolbar color="primary" class="app-toolbar">
    <a
      mat-button
      routerLink="/"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="brand"
      data-testid="nav-home"
    >
      <span class="brand-name">pw-craft</span>
      <span class="brand-divider" aria-hidden="true"></span>
      <span class="brand-sub">demo suite</span>
    </a>
    <span class="spacer"></span>
    <nav class="nav-links" aria-label="Primary">
      <a mat-button routerLink="/products" routerLinkActive="active" data-testid="nav-products">Products</a>
      <a mat-button routerLink="/form-demo" routerLinkActive="active" data-testid="nav-form">Form demo</a>
      <a mat-button routerLink="/async-demo" routerLinkActive="active" data-testid="nav-async">Async demo</a>
      <a mat-button routerLink="/counter-demo" routerLinkActive="active" data-testid="nav-counter">Counter</a>
      <a mat-button routerLink="/animation-demo" routerLinkActive="active" data-testid="nav-animation">Animation</a>
      <a mat-button routerLink="/about" routerLinkActive="active" data-testid="nav-about">About</a>
    </nav>
  </mat-toolbar>
</header>

<main class="app-main">
  <router-outlet />
</main>
